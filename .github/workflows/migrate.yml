# .github/workflows/migrate.yml
# Run Postgres migrations manually or on a schedule.
# Uses DATABASE_URL from the selected environment (staging/production).

name: Run Migrations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Database environment to migrate'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  migrate:
    name: Run PostgreSQL migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PostgreSQL migrations
        run: npm run db:migrate:postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
