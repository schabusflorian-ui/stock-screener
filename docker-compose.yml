# docker-compose.yml
# Local development environment with PostgreSQL and Redis

version: '3.8'

services:
  # ============================================
  # API Server
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/investment
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-in-production-32chars}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount data directory for SQLite fallback/backups
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-investment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Redis (for sessions and caching)
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Scheduler (background jobs)
  # ============================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: ["node", "src/jobs/masterScheduler.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/investment
      - REDIS_URL=redis://redis:6379
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks (optional, for isolation)
# ============================================
networks:
  default:
    name: investment-network
