<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1F2937; margin: 0; padding: 0; background-color: #FEF2F2; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .alert-banner { background: #DC2626; color: white; padding: 12px 20px; text-align: center; font-weight: 600; border-radius: 8px 8px 0 0; }
    .card { background: white; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(220, 38, 38, 0.15); padding: 24px; border-left: 4px solid #DC2626; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .icon { width: 48px; height: 48px; background: #FEE2E2; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 24px; height: 24px; color: #DC2626; }
    .entity { font-size: 14px; color: #6B7280; font-weight: 500; }
    .entity-label { color: #DC2626; font-weight: 600; }
    .title { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 8px; }
    .body { color: #4B5563; font-size: 16px; margin: 16px 0; padding: 16px; background: #FEF2F2; border-radius: 6px; }
    .meta { font-size: 14px; color: #6B7280; margin-top: 16px; }
    .actions { margin-top: 20px; display: flex; gap: 12px; }
    .btn { display: inline-block; padding: 12px 24px; background: #DC2626; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; }
    .btn:hover { background: #B91C1C; }
    .btn-secondary { background: white; color: #DC2626; border: 2px solid #DC2626; }
    .btn-secondary:hover { background: #FEF2F2; }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #9CA3AF; }
    .footer a { color: #6B7280; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="alert-banner">
      CRITICAL ALERT - IMMEDIATE ATTENTION REQUIRED
    </div>
    <div class="card">
      <div class="header">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div>
          <div class="entity">
            {{categoryLabel}}
            {{#if primaryEntity}}
            <span class="entity-label">{{primaryEntity.label}}</span>
            {{/if}}
          </div>
          <h1 class="title">{{title}}</h1>
        </div>
      </div>

      <div class="body">
        {{body}}
      </div>

      <p class="meta">Triggered at {{createdAt}}</p>

      <div class="actions">
        <a href="{{viewUrl}}" class="btn">View Details</a>
        <a href="{{viewUrl}}" class="btn btn-secondary">Take Action</a>
      </div>
    </div>

    <div class="footer">
      <p>This is a critical alert that requires your immediate attention.</p>
      <p><a href="{{unsubscribeUrl}}">Manage notification preferences</a></p>
    </div>
  </div>
</body>
</html>
