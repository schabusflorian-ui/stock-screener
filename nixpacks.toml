# nixpacks.toml
# Configuration for Railway Nixpacks builder
# Updated: 2026-01-30 to fix cache conflicts
# Updated: 2026-02-10 to add Python for AI analyst service (analystBridge.js spawns python3)
# Updated: 2026-02-17 to add Python deps and postgresql-client for pg_dump

[variables]
# Speed up and stabilize frontend build (avoids timeout/OOM on Railway)
GENERATE_SOURCEMAP = "false"
NODE_OPTIONS = "--max-old-space-size=4096"
# No other env needed at build time; sensitive vars are runtime-only

[phases.setup]
# Add postgresql-client for pg_dump (database backups)
aptPkgs = ["curl", "python3", "python3-pip", "postgresql-client"]

# Custom phase for Python dependencies - runs after install, before build
# Cache bust: 2026-02-17-v2
[phases.python_deps]
dependsOn = ["install"]
cmds = [
  "echo 'Installing Python deps v2' && pip3 install --break-system-packages --no-cache-dir requests beautifulsoup4 sentence-transformers psycopg2-binary && pip3 install --break-system-packages --no-cache-dir -r python-services/requirements.txt"
]

[phases.build]
dependsOn = ["python_deps"]
cmds = ["cd frontend && npm ci --legacy-peer-deps && CI=false npm run build"]

[start]
cmd = "npm run start:production"
